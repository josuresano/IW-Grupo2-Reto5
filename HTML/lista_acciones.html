{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Deusto QA - Acciones Correctivas</title>
    <link rel="stylesheet" href="{% static 'estilos.css' %}">
</head>

<body>
    <nav>
        <a href="{% url 'inicio' %}">Inicio</a>
        <a href="{% url 'lista_nc' %}">No Conformidades</a>
        <a href="{% url 'lista_acciones' %}">Acciones Correctivas</a>
        <a href="{% url 'lista_responsables' %}">Responsables</a>
    </nav>

    <div class="main-wrapper">
        <h1>Registro de Acciones Correctivas</h1>
        <a href="{% url 'alta_accion' %}" class="btn-ficha">Nueva Acción</a>
        <br><br>
        <table>
            <thead>
                <tr>
                    <th>Descripción</th>
                    <th>Estado</th>
                    <th>Acción 1</th>
                    <th>Acción 2</th>
                </tr>
            </thead>
            <tbody>
                {% for a in acciones %}
                <tr>
                    <td>{{ a.descripcion }}</td>
                    <td>{{ a.estado }}</td>
                    <td><a href="{% url 'editar_accion' a.id %}" class="btn">Actualizar</a></td>
                    <td><a href="{% url 'borrar_accion' a.id %}" class="btn">Baja</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>

</html>
