{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Deusto QA - Responsables</title>
    <link rel="stylesheet" href="{% static 'CSS/estilos.css' %}">
</head>

<body>
    <nav>
        <a href="{% url 'inicio' %}">Inicio</a>
        <a href="{% url 'lista_nc' %}">No Conformidades</a>
        <a href="{% url 'lista_acciones' %}">Acciones Correctivas</a>
        <a href="{% url 'lista_responsables' %}">Responsables</a>
    </nav>

    <div class="main-wrapper">
        <h1>Equipo de Responsables</h1>

        <table>
            <thead>
                <tr>
                    <th>Nombre y Apellidos</th>
                    <th>Correo Electrónico</th>
                </tr>
            </thead>
            <tbody>
                {% for r in resps %}
                <tr>
                    <td>{{ r.nombre }} {{ r.apellidos }}</td>
                    <td>{{ r.email }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>

</html>
