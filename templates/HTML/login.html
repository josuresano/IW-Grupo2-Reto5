{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Login - Deusto QA</title>
    <link rel="stylesheet" href="{% static 'CSS/estilos.css' %}">
</head>

<body>
    <div class="main-wrapper">
        <img src="{% static 'images/logo_deusto.png' %}" alt="Logo Deusto" class="login-logo">
        <h1>Iniciar Sesión</h1>
        <div class="form-group">
            <label>Usuario</label>
            <input type="text" id="username" placeholder="Usuario">
            <span class="error-msg" id="error-username"></span>
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="Contraseña">
            <span class="error-msg" id="error-password"></span>
        </div>
        <button onclick="handleLogin()" id="btn-login">Entrar</button>
        <div id="msg-error"></div>
    </div>
    <script src="{% static 'JS/scripts.js' %}"></script>
</body>

</html>
